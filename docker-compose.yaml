version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: infra/api.Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
        - API_KEY_SECRET=${API_KEY_SECRET}
        - SLACK_TOKEN=${SLACK_TOKEN}
    env_file:
      - .env
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  docs:
    build:
      context: .
      dockerfile: infra/docs.Dockerfile
    ports:
      - '3333:3333'
    environment:
      - NODE_ENV=production
    restart: unless-stopped
