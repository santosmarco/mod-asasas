apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: sd2-mod-api-sandbox
  namespace: sd2-mod-sandbox
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        autoscaling.knative.dev/maxScale: '3'
    spec:
      serviceAccountName: cloudrun-compute-sa@sd2-mod-sandbox.iam.gserviceaccount.com
      containers:
        - image: gcr.io/sd2-mod-sandbox/api:latest
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: latest
            - name: API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-key-secret
                  key: latest
            - name: SLACK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: slack-token
                  key: latest
          resources:
            limits:
              cpu: '1'
              memory: '512Mi'
